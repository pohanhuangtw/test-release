# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Update vulnerability source
description: |
  Runs a fetch script inside a target repository checkout, then commits and
  pushes using a freshly minted GitHub App installation token.
  On fetch failure, reverts all changes. Skips the push when nothing changed.

inputs:
  script:
    description: Path to the fetch script relative to the workflow repo (e.g. scripts/vulsource/debian.sh)
    required: true
  commit-message:
    description: Commit message for the new commit
    required: true
  client-id:
    description: GitHub App client ID used to mint the installation token
    required: true
  private-key:
    description: GitHub App private key used to mint the installation token
    required: true
  owner:
    description: Repository owner (org or user)
    required: true
  repository:
    description: Repository name (without owner), also used as the checkout path
    required: true

runs:
  using: composite
  steps:
    - name: Fetch
      shell: bash
      env:
        REPO: ${{ inputs.repository }}
        SCRIPT: ${{ inputs.script }}
      run: |
        cd "$REPO"
        "$GITHUB_WORKSPACE/$SCRIPT" || {
          echo "[Err] Revert changes" >&2
          git reset --hard HEAD
          exit 1
        }

    - id: detect
      name: Detect changes
      shell: bash
      env:
        REPO: ${{ inputs.repository }}
      run: |
        if [[ -n $(git -C "$REPO" status --porcelain) ]]; then
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
          echo "No changes — token refresh and push skipped"
        fi

    - if: steps.detect.outputs.has_changes == 'true'
      id: token
      name: Refresh GitHub App installation token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ inputs.client-id }}
        private-key: ${{ inputs.private-key }}
        owner: ${{ inputs.owner }}
        repositories: ${{ inputs.repository }}

    - if: steps.detect.outputs.has_changes == 'true'
      id: app-user
      name: Get GitHub App user ID
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.token }}
        APP_SLUG: ${{ steps.token.outputs.app-slug }}
      run: |
        user_id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
        echo "name=${APP_SLUG}" >> "$GITHUB_OUTPUT"
        echo "email=${user_id}+${APP_SLUG}@users.noreply.github.com" >> "$GITHUB_OUTPUT"

    - if: steps.detect.outputs.has_changes == 'true'
      name: Commit and push
      shell: bash
      env:
        GH_APP_TOKEN: ${{ steps.token.outputs.token }}
        OWNER: ${{ inputs.owner }}
        REPO: ${{ inputs.repository }}
        COMMIT_MSG: ${{ inputs.commit-message }}
        GIT_USER_NAME: ${{ steps.app-user.outputs.name }}
        GIT_USER_EMAIL: ${{ steps.app-user.outputs.email }}
      run: |
        cd "$REPO"

        # Update last-update.json with changed files
        changed=$(git diff --name-only HEAD; git ls-files --others --exclude-standard)
        if [ -f last-update.json ]; then
          json=$(cat last-update.json)
        else
          json='{}'
        fi
        for f in $changed; do
          [ -n "$f" ] && [ "$f" != "last-update.json" ] && \
            json=$(echo "$json" | jq --arg file "$f" --arg time "$TIMESTAMP" '.[$file] = $time')
        done
        echo "$json" | jq -S . > last-update.json

        git config user.name "$GIT_USER_NAME"
        git config user.email "$GIT_USER_EMAIL"
        git config --local --unset-all http.https://github.com/.extraheader || true
        git remote set-url origin "https://x-access-token:${GH_APP_TOKEN}@github.com/${OWNER}/${REPO}.git"
        git add -A
        git commit -m "$COMMIT_MSG"
        git push

    - name: Clean up staging directory
      shell: bash
      env:
        REPO: ${{ inputs.repository }}
      run: rm -rf "$REPO/stage"
