name: Build scanner - Build and publish vuldb explorer image

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-publish:
    if: github.repository == 'neuvector/release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.x'
      - name: Login to registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_NVBUILD_USERNAME }}
          password: ${{ secrets.DOCKERHUB_NVBUILD_PASSWORD }}
      - run: |
          export REPO_TOKEN=${{ secrets.BECITSTHERE_PULL_TOKEN }}

          git clone --depth 1 https://selvamt94:${REPO_TOKEN}@github.com/neuvector/vuldb-explorer.git
          cd vuldb-explorer

          npm install
          npm run build-client
          npm run build-server

          docker pull neuvector/scanner:latest
          SCANNER_VER=$(docker inspect neuvector/scanner:latest -f '{{ index .Config.Labels "neuvector.vuln_db" }}')
          docker run --rm -v $(pwd):/var/neuvector --entrypoint "/usr/local/bin/scanner" neuvector/scanner:latest -o /var/neuvector/cvedb.json -d /etc/neuvector/db/
          gzip cvedb.json

          docker build -t neuvector/vdb-explorer:latest .
          docker tag neuvector/vdb-explorer:latest neuvector/vdb-explorer:${SCANNER_VER}

          docker push neuvector/vdb-explorer:latest
          docker push neuvector/vdb-explorer:${SCANNER_VER}

          mkdir ~/.kube
          echo "${{ secrets.VDB_KUBECONFIG }}" > ~/.kube/config
          kubectl set image ds/neuvector-vdb-pod neuvector-vdb-pod=docker.io/neuvector/vdb-explorer:${SCANNER_VER} -n vulndb
