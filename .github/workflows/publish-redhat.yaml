name: Release Proc - Publish ubi images to redhat registry

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - run: |
          TAG=${{ github.event.inputs.tag }}
          SHORT_VER=$(echo $TAG | sed "s/[\.-]//g")
          C_DATA_FILE=c${SHORT_VER}stage.tgz
          E_DATA_FILE=e${SHORT_VER}stage.tgz
          M_DATA_FILE=m${SHORT_VER}stage.tgz
          S_DATA_FILE=s${SHORT_VER}stage.tgz

          cd ${{ github.workspace }}/ubi

          RELEASE=$TAG DFILE=$C_DATA_FILE make ubi_controller
          RELEASE=$TAG DFILE=$E_DATA_FILE make ubi_enforcer
          RELEASE=$TAG DFILE=$M_DATA_FILE make ubi_manager
          RELEASE=latest DFILE=$S_DATA_FILE make ubi_scanner

          RH_REG="quay.io"
          RH_REG_PATH="redhat-isv-containers"

          echo "Publish controller image"
          RH_REPO_ORG="5faae3f8609df0e3e820e3c8"
          printf '%s' "${{ secrets.REDHAT_CONTROLLER_REPO_PASSWORD }}" | docker login -u ${RH_REG_PATH}+${RH_REPO_ORG}-robot --password-stdin $RH_REG
          docker tag neuvector/controller.ubi:$TAG $RH_REG/$RH_REG_PATH/$RH_REPO_ORG:$TAG
          docker push $RH_REG/$RH_REG_PATH/$RH_REPO_ORG:$TAG
          docker logout

          echo "Publish enforcer image"
          RH_REPO_ORG="5e6200bbb4572ffc1bec24f3"
          printf '%s' "${{ secrets.REDHAT_ENFORCER_REPO_PASSWORD }}" |docker login -u ${RH_REG_PATH}+${RH_REPO_ORG}-robot --password-stdin $RH_REG
          docker tag neuvector/enforcer.ubi:$TAG $RH_REG/$RH_REG_PATH/$RH_REPO_ORG:$TAG
          docker push $RH_REG/$RH_REG_PATH/$RH_REPO_ORG:$TAG
          docker logout

          echo "Publish manager image"
          RH_REPO_ORG="5fab0160c0740beeb4f9a916"
          printf '%s' "${{ secrets.REDHAT_MANAGER_REPO_PASSWORD }}" | docker login -u ${RH_REG_PATH}+${RH_REPO_ORG}-robot --password-stdin $RH_REG
          docker tag neuvector/manager.ubi:$TAG $RH_REG/$RH_REG_PATH/$RH_REPO_ORG:$TAG
          docker push $RH_REG/$RH_REG_PATH/$RH_REPO_ORG:$TAG
          docker logout

          echo "Publish scanner image"
          RH_REPO_ORG="5fab0b4617c9c88249a6a1e0"
          printf '%s' "${{ secrets.REDHAT_SCANNER_REPO_PASSWORD }}" | docker login -u ${RH_REG_PATH}+${RH_REPO_ORG}-robot --password-stdin $RH_REG
          docker tag neuvector/scanner.ubi:latest $RH_REG/$RH_REG_PATH/$RH_REPO_ORG:$TAG
          docker push $RH_REG/$RH_REG_PATH/$RH_REPO_ORG:$TAG
          docker logout
